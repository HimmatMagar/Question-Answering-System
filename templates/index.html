<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
      <title>ChatFlow · Q&A Assistant</title>
      <style>
            * {
                  margin: 0;
                  padding: 0;
                  box-sizing: border-box;
            }

            body {
                  background: linear-gradient(145deg, #e0e7ff 0%, #f3f4fc 100%);
                  min-height: 100vh;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
                  padding: 1.5rem;
            }

            /* main chat card */
            .chat-container {
                  max-width: 800px;
                  width: 100%;
                  background: rgba(255, 255, 255, 0.92);
                  backdrop-filter: blur(2px);
                  border-radius: 2rem;
                  box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.05);
                  overflow: hidden;
                  transition: all 0.2s ease;
            }

            /* header */
            .chat-header {
                  background: #1e293b;
                  color: white;
                  padding: 1.2rem 1.8rem;
                  display: flex;
                  align-items: baseline;
                  justify-content: space-between;
                  flex-wrap: wrap;
                  gap: 0.5rem;
            }

            .title-section h1 {
                  font-size: 1.5rem;
                  font-weight: 600;
                  letter-spacing: -0.3px;
                  display: flex;
                  align-items: center;
                  gap: 8px;
            }

            .title-section h1 span {
                  background: #3b82f6;
                  font-size: 1.2rem;
                  padding: 0.2rem 0.6rem;
                  border-radius: 40px;
                  font-weight: 500;
            }

            .sub {
                  font-size: 0.8rem;
                  opacity: 0.8;
                  margin-top: 4px;
            }

            .status-badge {
                  background: #0f172a;
                  padding: 0.3rem 0.9rem;
                  border-radius: 60px;
                  font-size: 0.75rem;
                  font-weight: 500;
                  display: flex;
                  align-items: center;
                  gap: 6px;
            }

            .online-dot {
                  width: 8px;
                  height: 8px;
                  background: #22c55e;
                  border-radius: 50%;
                  display: inline-block;
                  box-shadow: 0 0 0 2px #22c55e80;
            }

            /* message area */
            .messages-area {
                  height: 420px;
                  overflow-y: auto;
                  padding: 1.5rem 1.2rem;
                  background: #f8fafc;
                  display: flex;
                  flex-direction: column;
                  gap: 1rem;
                  scroll-behavior: smooth;
            }

            /* message bubbles */
            .message {
                  display: flex;
                  flex-direction: column;
                  max-width: 85%;
                  animation: fadeSlideUp 0.2s ease-out;
            }

            .user-message {
                  align-self: flex-end;
            }

            .assistant-message {
                  align-self: flex-start;
            }

            .bubble {
                  padding: 0.7rem 1rem;
                  border-radius: 1.4rem;
                  line-height: 1.45;
                  font-size: 0.95rem;
                  word-break: break-word;
                  white-space: pre-wrap;
            }

            .user-message .bubble {
                  background: #3b82f6;
                  color: white;
                  border-bottom-right-radius: 0.3rem;
                  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            }

            .assistant-message .bubble {
                  background: white;
                  border: 1px solid #e2e8f0;
                  color: #0f172a;
                  border-bottom-left-radius: 0.3rem;
                  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            }

            .timestamp {
                  font-size: 0.7rem;
                  margin-top: 4px;
                  margin-inline: 0.5rem;
                  color: #64748b;
            }

            .user-message .timestamp {
                  text-align: right;
            }

            .assistant-message .timestamp {
                  text-align: left;
            }

            /* thinking / typing indicator */
            .typing-indicator {
                  background: #e9eef3;
                  border-radius: 1.2rem;
                  padding: 0.65rem 1rem;
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  width: fit-content;
            }

            .typing-indicator span {
                  width: 8px;
                  height: 8px;
                  background: #475569;
                  border-radius: 50%;
                  display: inline-block;
                  animation: pulse 1.2s infinite ease-in-out;
            }

            .typing-indicator span:nth-child(2) {
                  animation-delay: 0.15s;
            }

            .typing-indicator span:nth-child(3) {
                  animation-delay: 0.3s;
            }

            @keyframes pulse {

                  0%,
                  60%,
                  100% {
                        transform: scale(0.8);
                        opacity: 0.5;
                  }

                  30% {
                        transform: scale(1.2);
                        opacity: 1;
                  }
            }

            /* input panel */
            .input-panel {
                  background: white;
                  border-top: 1px solid #e2edf2;
                  padding: 1rem 1.2rem 1.3rem;
                  display: flex;
                  gap: 0.7rem;
                  align-items: flex-end;
            }

            .input-wrapper {
                  flex: 1;
                  background: #f1f5f9;
                  border-radius: 2rem;
                  padding: 0.4rem 0.8rem;
                  transition: all 0.2s;
                  border: 1px solid transparent;
            }

            .input-wrapper:focus-within {
                  background: white;
                  border-color: #3b82f6;
                  box-shadow: 0 0 0 2px #bfdbfe;
            }

            textarea {
                  width: 100%;
                  background: transparent;
                  border: none;
                  font-family: inherit;
                  font-size: 0.95rem;
                  padding: 0.6rem 0.2rem;
                  resize: none;
                  outline: none;
                  max-height: 100px;
                  color: #0f172a;
            }

            textarea::placeholder {
                  color: #94a3b8;
                  font-weight: 400;
            }

            button {
                  background: #3b82f6;
                  border: none;
                  color: white;
                  width: 46px;
                  height: 46px;
                  border-radius: 60px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  cursor: pointer;
                  transition: all 0.2s ease;
                  box-shadow: 0 4px 8px rgba(59, 130, 246, 0.2);
            }

            button:hover {
                  background: #2563eb;
                  transform: scale(0.96);
            }

            button:active {
                  background: #1d4ed8;
            }

            button:disabled {
                  background: #9ca3af;
                  cursor: not-allowed;
                  transform: none;
                  box-shadow: none;
            }

            svg {
                  width: 22px;
                  height: 22px;
                  stroke: white;
                  stroke-width: 2;
                  fill: none;
            }

            .info-note {
                  font-size: 0.7rem;
                  text-align: center;
                  padding: 0.6rem;
                  background: #f1f5f9;
                  color: #334155;
                  border-top: 1px solid #e2e8f0;
            }

            @keyframes fadeSlideUp {
                  from {
                        opacity: 0;
                        transform: translateY(10px);
                  }

                  to {
                        opacity: 1;
                        transform: translateY(0);
                  }
            }

            /* scrollbar */
            .messages-area::-webkit-scrollbar {
                  width: 5px;
            }

            .messages-area::-webkit-scrollbar-track {
                  background: #e2e8f0;
                  border-radius: 10px;
            }

            .messages-area::-webkit-scrollbar-thumb {
                  background: #94a3b8;
                  border-radius: 10px;
            }
      </style>
</head>

<body>
      <div class="chat-container">
            <div class="chat-header">
                  <div class="title-section">
                        <h1>
                              💬 QueryMind
                              <span>QA</span>
                        </h1>
                  </div>
                  <div class="status-badge" id="apiStatus">
                        <span class="online-dot"></span>
                        <span id="statusText">checking API...</span>
                  </div>
            </div>

            <div class="messages-area" id="chatMessages">
                  <div class="message assistant-message">
                        <div class="bubble">
                              👋 Hi! I'm your AI assistant.How can i Help You?
                        </div>
                        <div class="timestamp">just now
                        </div>
                  </div>
            </div>

            <div class="input-panel">
                  <div class="input-wrapper">
                        <textarea id="userInput" rows="1"
                              placeholder="Type your query... e.g., What is machine learning?"
                              maxlength="800"></textarea>
                  </div>
                  <button id="sendBtn" aria-label="Send message">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                              <line x1="22" y1="2" x2="11" y2="13"></line>
                              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                  </button>
            </div>
      </div>

      <script>
            (function () {
                  // -------- CONFIGURATION ----------
                  // FastAPI endpoint: change if your backend runs on different port/host
                  const PREDICT_ENDPOINT = `http://0.0.0.0:8000/ask`;

                  // DOM elements
                  const messagesContainer = document.getElementById('chatMessages');
                  const userInputEl = document.getElementById('userInput');
                  const sendButton = document.getElementById('sendBtn');
                  const statusTextSpan = document.getElementById('statusText');
                  const statusDot = document.querySelector('#apiStatus .online-dot');

                  // state
                  let isWaitingForResponse = false;

                  // ---------- helper: scroll to bottom ----------
                  function scrollToBottom() {
                        messagesContainer.scrollTo({
                              top: messagesContainer.scrollHeight,
                              behavior: 'smooth'
                        });
                  }

                  // ---------- timestamp formatter (HH:MM) ----------
                  function getFormattedTime() {
                        const now = new Date();
                        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                  }

                  // ---------- add a new message bubble ----------
                  function addMessage(role, content, isError = false) {
                        const messageDiv = document.createElement('div');
                        messageDiv.classList.add('message');
                        if (role === 'user') {
                              messageDiv.classList.add('user-message');
                        } else {
                              messageDiv.classList.add('assistant-message');
                        }

                        const bubbleDiv = document.createElement('div');
                        bubbleDiv.classList.add('bubble');
                        // error styling gentle hint
                        if (isError && role === 'assistant') {
                              bubbleDiv.style.background = '#fee2e2';
                              bubbleDiv.style.border = '1px solid #fecaca';
                              bubbleDiv.style.color = '#991b1b';
                        }
                        bubbleDiv.innerHTML = content.replace(/\n/g, '<br>'); // support line breaks

                        const timeSpan = document.createElement('div');
                        timeSpan.classList.add('timestamp');
                        timeSpan.innerText = getFormattedTime();

                        messageDiv.appendChild(bubbleDiv);
                        messageDiv.appendChild(timeSpan);
                        messagesContainer.appendChild(messageDiv);
                        scrollToBottom();
                        return messageDiv;
                  }

                  // ---------- show typing indicator (assistant is thinking) ----------
                  let typingIndicatorDiv = null;
                  function showTypingIndicator() {
                        removeTypingIndicator(); // remove if any left
                        const indicatorWrapper = document.createElement('div');
                        indicatorWrapper.classList.add('message', 'assistant-message');
                        indicatorWrapper.id = 'typingIndicatorMsg';

                        const indicatorBubble = document.createElement('div');
                        indicatorBubble.classList.add('typing-indicator');
                        for (let i = 0; i < 3; i++) {
                              const dot = document.createElement('span');
                              indicatorBubble.appendChild(dot);
                        }
                        indicatorWrapper.appendChild(indicatorBubble);

                        const fakeTimestamp = document.createElement('div');
                        fakeTimestamp.classList.add('timestamp');
                        fakeTimestamp.innerText = getFormattedTime();
                        indicatorWrapper.appendChild(fakeTimestamp);

                        messagesContainer.appendChild(indicatorWrapper);
                        scrollToBottom();
                        typingIndicatorDiv = indicatorWrapper;
                  }

                  function removeTypingIndicator() {
                        if (typingIndicatorDiv && typingIndicatorDiv.parentNode) {
                              typingIndicatorDiv.remove();
                        }
                        typingIndicatorDiv = null;
                  }

                  // ---------- update backend health/status indicator (ping /predict OPTIONS or simple fetch)----------
                  async function checkApiStatus() {
                        try {
                              // lightweight preflight: we just check if endpoint is reachable (send dummy OPTIONS or small GET)
                              // using a short timeout to avoid long wait
                              const controller = new AbortController();
                              const timeoutId = setTimeout(() => controller.abort(), 3000);
                              const response = await fetch(PREDICT_ENDPOINT, {
                                    method: 'OPTIONS',
                                    signal: controller.signal,
                                    headers: { 'Accept': 'application/json' }
                              }).catch(() => null);
                              clearTimeout(timeoutId);

                              if (response && (response.ok || response.status === 405 || response.status === 422)) {
                                    // 405 means method not allowed but endpoint exists (fastapi will accept POST)
                                    // 422 usually means missing body but endpoint alive -> ok
                                    statusTextSpan.innerText = 'online · ready';
                                    statusDot.style.background = '#22c55e';
                                    statusDot.style.boxShadow = '0 0 0 2px #22c55e80';
                              } else {
                                    // fallback: try simple HEAD or GET? but we trust OPTIONS is enough.
                                    // else mark as unreachable
                                    statusTextSpan.innerText = 'unreachable (check CORS)';
                                    statusDot.style.background = '#f97316';
                              }
                        } catch (err) {
                              statusTextSpan.innerText = '⚠️ endpoint offline';
                              statusDot.style.background = '#ef4444';
                              console.warn('API status check failed:', err);
                        }
                  }

                  // ---------- send query to FastAPI /predict ----------
                  async function sendUserQuery(queryText) {
                        if (!queryText || queryText.trim() === '') return false;
                        if (isWaitingForResponse) {
                              // optional subtle feedback
                              const tempWarn = addMessage('assistant', '⏳ Please wait, I am still answering your previous question.', true);
                              setTimeout(() => tempWarn.remove(), 2000);
                              return false;
                        }

                        // trim and display user message
                        const cleanedQuery = queryText.trim();
                        addMessage('user', cleanedQuery);
                        userInputEl.value = '';          // clear
                        userInputEl.style.height = 'auto';

                        isWaitingForResponse = true;
                        sendButton.disabled = true;
                        userInputEl.disabled = true;

                        // show typing indicator
                        showTypingIndicator();

                        try {
                              const controller = new AbortController();
                              const timeoutId = setTimeout(() => controller.abort(), 30000); // 30 sec timeout

                              const response = await fetch("http://localhost:8000/ask", {
                                    method: 'POST',
                                    headers: {
                                          'Content-Type': 'application/json',
                                          'Accept': 'application/json'
                                    },
                                    body: JSON.stringify({ question: cleanedQuery }),
                                    signal: controller.signal
                              });

                              clearTimeout(timeoutId);

                              // remove typing indicator
                              removeTypingIndicator();

                              if (!response.ok) {
                                    let errorDetail = `Server responded with ${response.status}`;
                                    try {
                                          const errorData = await response.json();
                                          errorDetail = errorData.detail || errorData.message || errorDetail;
                                    } catch (e) { /* ignore */ }
                                    throw new Error(errorDetail);
                              }

                              const data = await response.json();
                              // FastAPI /predict may return: { answer: "...", response: "...", result: "..." } flexible
                              let assistantReply = "I received your request, but no answer field was provided.";
                              if (data.answer) assistantReply = data.answer;
                              else if (data.response) assistantReply = data.response;
                              else if (data.result) assistantReply = data.result;
                              else if (data.message) assistantReply = data.message;
                              else if (typeof data === 'string') assistantReply = data;
                              else assistantReply = JSON.stringify(data, null, 2);

                              addMessage('assistant', assistantReply);

                        } catch (err) {
                              removeTypingIndicator();
                              let errorMsg = '';
                              if (err.name === 'AbortError') {
                                    errorMsg = '⏰ Request timeout. FastAPI endpoint took too long to respond.';
                              } else if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
                                    errorMsg = '🔌 Network error: cannot reach FastAPI `/ask` endpoint. Make sure the server is running (CORS enabled) and the URL is correct.';
                              } else {
                                    errorMsg = `❌ Error: ${err.message}`;
                              }
                              addMessage('assistant', errorMsg, true);
                              console.error('API error:', err);
                        } finally {
                              isWaitingForResponse = false;
                              sendButton.disabled = false;
                              userInputEl.disabled = false;
                              userInputEl.focus();
                              // adjust textarea height again (clear height)
                              resetTextareaHeight();
                        }
                        return true;
                  }

                  // auto resize textarea as user types
                  function autoResizeTextarea() {
                        userInputEl.style.height = 'auto';
                        let newHeight = Math.min(userInputEl.scrollHeight, 110);
                        userInputEl.style.height = newHeight + 'px';
                  }

                  function resetTextareaHeight() {
                        userInputEl.style.height = 'auto';
                        userInputEl.style.height = 'auto';
                  }

                  // handle send action
                  function handleSend() {
                        const rawQuery = userInputEl.value;
                        if (!rawQuery || rawQuery.trim() === '') return;
                        sendUserQuery(rawQuery);
                  }

                  // keyboard: Ctrl+Enter or Cmd+Enter to send, Enter alone adds newline (but we treat shift+enter as newline)
                  function onInputKeydown(e) {
                        if (e.key === 'Enter' && !e.shiftKey) {
                              e.preventDefault();
                              if (!isWaitingForResponse) {
                                    handleSend();
                              }
                        }
                        // auto-resize after any input
                        autoResizeTextarea();
                  }

                  function onInputInput() {
                        autoResizeTextarea();
                  }

                  // initial status test and event binding
                  function init() {
                        checkApiStatus();
                        // re-check every 30 secs just for status visibility
                        setInterval(checkApiStatus, 30000);

                        sendButton.addEventListener('click', handleSend);
                        userInputEl.addEventListener('keydown', onInputKeydown);
                        userInputEl.addEventListener('input', onInputInput);
                        userInputEl.focus();

                        // optional: clear default initial if needed
                        resetTextareaHeight();
                  }

                  // start everything
                  init();
            })();
      </script>
</body>

</html>
